{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Testifize Pipeline{% endblock %}</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8fb;
      --panel: #ffffff;
      --panel-subtle: #f8fafc;
      --border: #e1e7ef;
      --text: #101828;
      --muted: #667085;
      --accent: #2563eb;
      --accent-strong: #1e40af;
      --danger: #b42318;
      --warn: #a15c07;
      --active: #b54708;
      --review: #6941c6;
      --ok: #13795b;
      --shadow: 0 1px 2px rgba(16, 24, 40, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      color: var(--accent-strong);
      text-decoration: underline;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 240px minmax(0, 1fr);
    }

    .sidebar {
      background: #ffffff;
      color: var(--text);
      border-right: 1px solid var(--border);
      padding: 20px 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      margin-bottom: 24px;
      min-height: 36px;
    }

    .brand-logo {
      display: block;
      width: 150px;
      max-width: 100%;
      height: auto;
    }

    .nav {
      display: grid;
      gap: 4px;
    }

    .nav a {
      display: block;
      padding: 9px 10px;
      border-radius: 6px;
      color: #475467;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
    }

    .nav a:hover,
    .nav a.active {
      background: #eff6ff;
      color: var(--accent);
    }

    .content {
      padding: 24px;
      min-width: 0;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
      font-weight: 750;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .actions form {
      margin: 0;
    }

    .inline-form {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin: 0;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
    }

    .button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: white;
    }

    .button.success {
      border-color: var(--ok);
      background: var(--ok);
      color: white;
    }

    .button.small {
      min-height: 30px;
      padding: 5px 10px;
      font-size: 12px;
    }

    .button:hover {
      text-decoration: none;
      border-color: var(--accent);
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(8, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .metric,
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .metric {
      position: relative;
      display: grid;
      grid-template-columns: 36px minmax(0, 1fr);
      column-gap: 10px;
      row-gap: 4px;
      align-items: center;
      padding: 14px 16px;
      min-height: 97px;
      overflow: hidden;
    }

    .metric-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      grid-column: 1;
      grid-row: 2;
      width: 34px;
      height: 34px;
      color: var(--accent);
    }

    .metric-icon svg {
      width: 32px;
      height: 32px;
      stroke: currentColor;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .metric.green .metric-icon {
      color: #15803d;
    }

    .metric.amber .metric-icon {
      color: #d97706;
    }

    .metric.purple .metric-icon {
      color: #6d28d9;
    }

    .metric.red .metric-icon {
      color: #dc2626;
    }

    .metric.slate .metric-icon {
      color: #475467;
    }

    .metric-body {
      display: contents;
    }

    .metric-label {
      grid-column: 1 / -1;
      grid-row: 1;
      min-width: 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .metric-value {
      grid-column: 2;
      grid-row: 2;
      min-width: 0;
      color: var(--text);
      font-size: 32px;
      line-height: 0.95;
      font-weight: 650;
      letter-spacing: 0;
    }

    .metric-value.compact {
      font-size: 14px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .metric-note {
      display: flex;
      align-items: center;
      grid-column: 1 / -1;
      grid-row: 3;
      gap: 8px;
      min-width: 0;
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .metric-arrow {
      flex: 0 0 auto;
      color: #98a2b3;
      font-size: 16px;
      line-height: 1;
    }

    .metric.green .metric-note {
      color: #15803d;
    }

    .metric.amber .metric-note {
      color: #d97706;
    }

    .metric.purple .metric-note {
      color: #6d28d9;
    }

    .metric.red .metric-note {
      color: #dc2626;
    }

    .metric.blue .metric-note {
      color: #1d4ed8;
    }

    .metric.slate .metric-note {
      color: #475467;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(320px, 0.75fr);
      gap: 16px;
      align-items: start;
    }

    .stack {
      display: grid;
      gap: 16px;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .panel-title {
      margin: 0;
      font-size: 16px;
      font-weight: 720;
    }

    .panel-body {
      padding: 0;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th,
    td {
      padding: 10px 12px;
      border-bottom: 1px solid #edf0f4;
      text-align: left;
      vertical-align: middle;
      white-space: nowrap;
    }

    th {
      color: var(--muted);
      background: var(--panel-subtle);
      font-size: 12px;
      text-transform: uppercase;
      font-weight: 750;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .file-name {
      max-width: 460px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .muted {
      color: var(--muted);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      font-size: 12px;
      font-weight: 700;
    }

    .badge.failed {
      background: #fef3f2;
      color: var(--danger);
    }

    .badge.new,
    .badge.queued {
      background: #fff7ed;
      color: var(--warn);
    }

    .badge.downloaded,
    .badge.uploaded,
    .badge.processed {
      background: #ecfdf3;
      color: var(--ok);
    }

    .status-green {
      color: #087443;
    }

    .status-blue {
      color: #175cd3;
    }

    .status-red {
      color: var(--danger);
    }

    .status-orange {
      color: var(--active);
    }

    .status-purple {
      color: var(--review);
    }

    .mirror-table {
      display: grid;
      min-width: 1060px;
    }

    .mirror-head,
    .mirror-summary {
      display: grid;
      grid-template-columns: minmax(280px, 1fr) 110px 110px 110px 110px 110px 130px;
      align-items: center;
      gap: 12px;
    }

    .mirror-head {
      padding: 10px 12px;
      color: var(--muted);
      background: var(--panel-subtle);
      border-bottom: 1px solid #edf0f4;
      font-size: 12px;
      text-transform: uppercase;
      font-weight: 750;
    }

    .mirror-folder {
      border-bottom: 1px solid #edf0f4;
    }

    .mirror-folder:last-child {
      border-bottom: 0;
    }

    .mirror-summary {
      min-height: 48px;
      padding: 10px 12px;
      cursor: pointer;
      list-style: none;
      font-size: 14px;
    }

    .mirror-summary::-webkit-details-marker {
      display: none;
    }

    .mirror-summary::before {
      content: "+";
      width: 16px;
      color: var(--muted);
    }

    .mirror-folder[open] .mirror-summary::before {
      content: "-";
    }

    .mirror-summary {
      grid-template-columns: 16px minmax(264px, 1fr) 110px 110px 110px 110px 110px 130px;
    }

    .mirror-head {
      grid-template-columns: 16px minmax(264px, 1fr) 110px 110px 110px 110px 110px 130px;
    }

    .mirror-head::before {
      content: "";
    }

    .mirror-folder-name {
      font-weight: 720;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mirror-files {
      border-top: 1px solid #edf0f4;
      background: #fbfcfe;
      overflow-x: auto;
    }

    .mirror-files table {
      font-size: 13px;
    }

    .mirror-file-row.new {
      background: #f0fdf4;
    }

    .mirror-file-row.processed {
      background: #eff6ff;
    }

    .mirror-file-row.active {
      background: #fff7ed;
    }

    .mirror-file-row.review {
      background: #f4f3ff;
    }

    .mirror-file-row.deleted_remote {
      background: #fef3f2;
    }

    .mirror-status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
      min-width: 24px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 750;
      white-space: nowrap;
    }

    .mirror-status.new {
      background: #dcfae6;
      color: #087443;
    }

    .mirror-status.processed {
      background: #dbeafe;
      color: #175cd3;
    }

    .mirror-status.active {
      background: #fedf89;
      color: #93370d;
    }

    .mirror-status.review {
      background: #ebe9fe;
      color: #5925dc;
    }

    .mirror-status.deleted_remote {
      background: #fee4e2;
      color: var(--danger);
    }

    .mirror-pager {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-top: 1px solid #edf0f4;
      background: var(--panel);
    }

    .mirror-pager.single-page {
      display: none;
    }

    .mirror-page-status {
      min-width: 52px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.48;
    }

    .review-modal[hidden] {
      display: none;
    }

    .review-modal {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .review-backdrop {
      position: absolute;
      inset: 0;
      background: rgba(15, 23, 42, 0.42);
    }

    .review-dialog {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      width: min(1180px, 100%);
      max-height: min(820px, calc(100vh - 48px));
      overflow: hidden;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 24px 64px rgba(15, 23, 42, 0.24);
    }

    .review-header,
    .review-footer {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .review-header {
      display: grid;
      gap: 12px;
    }

    .review-titlebar,
    .review-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .review-title {
      margin: 0;
      max-width: 880px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 18px;
      font-weight: 760;
    }

    .review-details {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 8px 14px;
      font-size: 12px;
      color: var(--muted);
    }

    .review-details strong {
      display: block;
      margin-bottom: 2px;
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .review-body {
      min-height: 0;
      overflow: hidden;
      background: #fbfcfe;
    }

    .review-sheet-tabs {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding: 10px 12px;
      border-bottom: 1px solid #edf0f4;
      background: var(--panel);
    }

    .review-sheet-tabs button {
      min-height: 30px;
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--panel);
      color: var(--text);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .review-sheet-tabs button.active {
      border-color: var(--accent);
      background: #eff6ff;
      color: var(--accent-strong);
    }

    .review-preview {
      max-height: 540px;
      overflow: auto;
    }

    .review-preview table {
      min-width: 760px;
      font-size: 12px;
    }

    .review-preview svg {
      display: block;
      width: 100%;
      height: 360px;
      background: var(--panel);
      border-top: 1px solid #edf0f4;
    }

    .review-preview td,
    .review-preview th {
      max-width: 240px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .review-message {
      padding: 16px;
      color: var(--muted);
      font-size: 14px;
    }

    .review-vendor {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .review-vendor select {
      min-width: 220px;
      min-height: 36px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
      padding: 6px 8px;
      font: inherit;
    }

    .table-select {
      min-width: 170px;
      min-height: 32px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
      padding: 5px 8px;
      font: inherit;
      font-size: 13px;
    }

    .review-footer {
      border-top: 1px solid var(--border);
      border-bottom: 0;
    }

    .status-list {
      display: grid;
      gap: 1px;
      background: var(--border);
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      background: var(--panel);
      color: var(--text);
    }

    .empty {
      padding: 22px 16px;
      color: var(--muted);
      font-size: 14px;
    }

    .messages {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    .message {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
      font-size: 14px;
    }

    .message.success {
      border-color: #abefc6;
      background: #ecfdf3;
      color: #087443;
    }

    .message.error {
      border-color: #fecdca;
      background: #fef3f2;
      color: var(--danger);
    }

    .filterbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filterbar a {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--panel);
      color: var(--text);
      font-size: 13px;
      font-weight: 650;
      text-decoration: none;
    }

    .filterbar a.active {
      border-color: var(--accent);
      background: #eff6ff;
      color: var(--accent-strong);
    }

    @media (max-width: 1080px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .metrics {
        grid-template-columns: repeat(8, minmax(160px, 1fr));
        overflow-x: auto;
        padding-bottom: 4px;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .content {
        padding: 16px;
      }

      .topbar {
        display: grid;
      }

      .actions {
        justify-content: start;
      }

      .review-modal {
        padding: 12px;
      }

      .review-dialog {
        max-height: calc(100vh - 24px);
      }

      .review-footer {
        align-items: stretch;
        flex-wrap: wrap;
      }

      .review-vendor,
      .review-vendor select {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <img class="brand-logo" src="{% static 'pics/cropped-Testifize_Logo.webp' %}" alt="Testifize">
      </div>
      <nav class="nav" aria-label="Primary">
        <a class="{% if active_nav == 'dashboard' %}active{% endif %}" href="{% url 'pipeline_dashboard:dashboard' %}">Dashboard</a>
        <a class="{% if active_nav == 'folders' %}active{% endif %}" href="{% url 'pipeline_dashboard:folders' %}">SF folders</a>
        <a class="{% if active_nav == 'process' %}active{% endif %}" href="{% url 'pipeline_dashboard:process' %}">Process</a>
      </nav>
    </aside>

    <main class="content">
      {% if messages %}
        <div class="messages">
          {% for message in messages %}
            <div class="message {{ message.tags }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
