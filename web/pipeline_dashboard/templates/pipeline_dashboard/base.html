{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Testifize Pipeline{% endblock %}</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --panel-subtle: #f9fafb;
      --border: #d9dee5;
      --text: #18202a;
      --muted: #647184;
      --accent: #2563eb;
      --accent-strong: #1e40af;
      --danger: #b42318;
      --warn: #a15c07;
      --ok: #13795b;
      --shadow: 0 1px 2px rgba(16, 24, 40, 0.06);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      letter-spacing: 0;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      color: var(--accent-strong);
      text-decoration: underline;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 240px minmax(0, 1fr);
    }

    .sidebar {
      background: #111827;
      color: #e5e7eb;
      padding: 20px 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      margin-bottom: 24px;
      min-height: 36px;
    }

    .brand-logo {
      display: block;
      width: 150px;
      max-width: 100%;
      height: auto;
    }

    .nav {
      display: grid;
      gap: 4px;
    }

    .nav a {
      display: block;
      padding: 9px 10px;
      border-radius: 6px;
      color: #d1d5db;
      text-decoration: none;
      font-size: 14px;
    }

    .nav a:hover,
    .nav a.active {
      background: #1f2937;
      color: #ffffff;
    }

    .content {
      padding: 24px;
      min-width: 0;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
      font-weight: 750;
    }

    .subtitle {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
    }

    .actions form {
      margin: 0;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
    }

    .button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: white;
    }

    .button:hover {
      text-decoration: none;
      border-color: var(--accent);
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .metric,
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .metric {
      padding: 14px;
      min-height: 86px;
    }

    .metric-label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      font-weight: 700;
    }

    .metric-value {
      margin-top: 8px;
      font-size: 26px;
      font-weight: 780;
    }

    .metric-value.compact {
      font-size: 14px;
      line-height: 1.35;
      overflow-wrap: anywhere;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.45fr) minmax(320px, 0.75fr);
      gap: 16px;
      align-items: start;
    }

    .stack {
      display: grid;
      gap: 16px;
    }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }

    .panel-title {
      margin: 0;
      font-size: 16px;
      font-weight: 720;
    }

    .panel-body {
      padding: 0;
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th,
    td {
      padding: 10px 12px;
      border-bottom: 1px solid #edf0f4;
      text-align: left;
      vertical-align: middle;
      white-space: nowrap;
    }

    th {
      color: var(--muted);
      background: var(--panel-subtle);
      font-size: 12px;
      text-transform: uppercase;
      font-weight: 750;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .file-name {
      max-width: 460px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .muted {
      color: var(--muted);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 2px 8px;
      border-radius: 999px;
      background: #eef2ff;
      color: #3730a3;
      font-size: 12px;
      font-weight: 700;
    }

    .badge.failed {
      background: #fef3f2;
      color: var(--danger);
    }

    .badge.new,
    .badge.queued {
      background: #fff7ed;
      color: var(--warn);
    }

    .badge.downloaded,
    .badge.uploaded,
    .badge.processed {
      background: #ecfdf3;
      color: var(--ok);
    }

    .status-green {
      color: #087443;
    }

    .status-blue {
      color: #175cd3;
    }

    .status-red {
      color: var(--danger);
    }

    .mirror-table {
      display: grid;
      min-width: 860px;
    }

    .mirror-head,
    .mirror-summary {
      display: grid;
      grid-template-columns: minmax(280px, 1fr) 120px 120px 120px 130px;
      align-items: center;
      gap: 12px;
    }

    .mirror-head {
      padding: 10px 12px;
      color: var(--muted);
      background: var(--panel-subtle);
      border-bottom: 1px solid #edf0f4;
      font-size: 12px;
      text-transform: uppercase;
      font-weight: 750;
    }

    .mirror-folder {
      border-bottom: 1px solid #edf0f4;
    }

    .mirror-folder:last-child {
      border-bottom: 0;
    }

    .mirror-summary {
      min-height: 48px;
      padding: 10px 12px;
      cursor: pointer;
      list-style: none;
      font-size: 14px;
    }

    .mirror-summary::-webkit-details-marker {
      display: none;
    }

    .mirror-summary::before {
      content: "+";
      width: 16px;
      color: var(--muted);
    }

    .mirror-folder[open] .mirror-summary::before {
      content: "-";
    }

    .mirror-summary {
      grid-template-columns: 16px minmax(264px, 1fr) 120px 120px 120px 130px;
    }

    .mirror-head {
      grid-template-columns: 16px minmax(264px, 1fr) 120px 120px 120px 130px;
    }

    .mirror-head::before {
      content: "";
    }

    .mirror-folder-name {
      font-weight: 720;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mirror-files {
      border-top: 1px solid #edf0f4;
      background: #fbfcfe;
      overflow-x: auto;
    }

    .mirror-files table {
      font-size: 13px;
    }

    .mirror-file-row.new {
      background: #f0fdf4;
    }

    .mirror-file-row.processed {
      background: #eff6ff;
    }

    .mirror-file-row.deleted_remote {
      background: #fef3f2;
    }

    .mirror-status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 24px;
      min-width: 24px;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 750;
      white-space: nowrap;
    }

    .mirror-status.new {
      background: #dcfae6;
      color: #087443;
    }

    .mirror-status.processed {
      background: #dbeafe;
      color: #175cd3;
    }

    .mirror-status.deleted_remote {
      background: #fee4e2;
      color: var(--danger);
    }

    .mirror-pager {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-top: 1px solid #edf0f4;
      background: var(--panel);
    }

    .mirror-pager.single-page {
      display: none;
    }

    .mirror-page-status {
      min-width: 52px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      font-weight: 650;
    }

    .button:disabled {
      cursor: not-allowed;
      opacity: 0.48;
    }

    .status-list {
      display: grid;
      gap: 1px;
      background: var(--border);
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      background: var(--panel);
    }

    .empty {
      padding: 22px 16px;
      color: var(--muted);
      font-size: 14px;
    }

    .messages {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    .message {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
      font-size: 14px;
    }

    .message.success {
      border-color: #abefc6;
      background: #ecfdf3;
      color: #087443;
    }

    .message.error {
      border-color: #fecdca;
      background: #fef3f2;
      color: var(--danger);
    }

    .filterbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }

    .filterbar a {
      display: inline-flex;
      align-items: center;
      min-height: 32px;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--panel);
      color: var(--text);
      font-size: 13px;
      font-weight: 650;
      text-decoration: none;
    }

    .filterbar a.active {
      border-color: var(--accent);
      background: #eff6ff;
      color: var(--accent-strong);
    }

    @media (max-width: 1080px) {
      .shell {
        grid-template-columns: 1fr;
      }

      .metrics {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .content {
        padding: 16px;
      }

      .topbar {
        display: grid;
      }

      .actions {
        justify-content: start;
      }

      .metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand">
        <img class="brand-logo" src="{% static 'pics/cropped-Testifize_Logo.webp' %}" alt="Testifize">
      </div>
      <nav class="nav" aria-label="Primary">
        <a class="{% if active_nav == 'dashboard' %}active{% endif %}" href="{% url 'pipeline_dashboard:dashboard' %}">Dashboard</a>
        <a class="{% if active_nav == 'assets' %}active{% endif %}" href="{% url 'pipeline_dashboard:assets' %}">Assets</a>
        <a class="{% if active_nav == 'folders' %}active{% endif %}" href="{% url 'pipeline_dashboard:folders' %}">SF folders</a>
        <a class="{% if active_nav == 'vendors' %}active{% endif %}" href="{% url 'pipeline_dashboard:vendors' %}">Vendors</a>
        <a href="{% url 'admin:index' %}">Django admin</a>
      </nav>
    </aside>

    <main class="content">
      {% if messages %}
        <div class="messages">
          {% for message in messages %}
            <div class="message {{ message.tags }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
  </div>
</body>
</html>
